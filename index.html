<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House Resources</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <style>
        .font-manrope {
            font-family: "Manrope", sans-serif;

<body class="font-manrope">

    <main class="max-w-screen-2xl mx-auto px-16 lg:px-28">
        <header class="md:flex gap-10 pt-10 mb-20">
            <div>
                <h2 class="text-5xl md:text-7xl font-extrabold text-[#1C1C1C] mb-8">It's good <br>
                    tea time at The Tea House</h2>
                <p class="text-[#777777] text-lg font-medium mb-8">Tea and Botanical Solutions Supplier Give Optimum

                    Satisfaction

                </p>
                <button
                    class="text-white rounded-xl bg-gradient-to-r from-[#FF8938] to-[#FF0000] py-5 pr-10 pl-5 font-bold text-xl">
                    Explore More
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6 inline ml-4 text-white">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25" />

                </button>
            </div>
            <div>
                <img class="w-full" src="images/banner.png" alt="">
                <div class="flex items-center rounded-lg shadow-xl/30  justify-center max-w-64 p-5 relative bottom-20 left-6">
                    <img class="w-12 mr-3" src="images/star.png" alt="">
                    <div>
                        <h3 class="text-[#1C1C1C] font-extrabold text-3xl">5.00</h3>
                        <p class="text-[#777777] font-semibold text-base">Trust Pilot Ratings</p>
